name: Update Bioconda Recipe

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-bioconda:
    name: Update Bioconda Recipe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract package metadata
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package_name=skadi" >> "$GITHUB_OUTPUT"
          # Extract URL from setup.py if available
          URL=$(grep -oP 'url="\K[^"]+' setup.py || echo "https://github.com/${{ github.repository }}")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 for PyPI sdist
        id: sha
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          PACKAGE="${{ steps.meta.outputs.package_name }}"
          # Wait a moment for PyPI to publish
          sleep 30
          # Try to fetch SHA256 from PyPI JSON API
          for i in {1..10}; do
            SHA=$(curl -s "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data['urls'][0]['digests']['sha256'])" 2>/dev/null || true)
            if [ -n "$SHA" ]; then
              echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "Attempt $i: SHA256 not available yet, waiting..."
            sleep 60
          done
          if [ -z "$SHA" ]; then
            echo "::error::Failed to retrieve SHA256 from PyPI after 10 attempts"
            exit 1
          fi

      - name: Checkout bioconda-recipes
        uses: actions/checkout@v4
        with:
          repository: bioconda/bioconda-recipes
          path: bioconda-recipes
          token: ${{ secrets.BIOCONDA_BOT_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "Bioconda Bot"
          git config --global user.email "bioconda@users.noreply.github.com"

      - name: Update Bioconda recipe
        id: update
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          PACKAGE="${{ steps.meta.outputs.package_name }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          RECIPE_DIR="bioconda-recipes/recipes/${PACKAGE}"

          if [ ! -d "$RECIPE_DIR" ]; then
            echo "::error::Recipe directory $RECIPE_DIR not found in bioconda-recipes"
            exit 1
          fi

          # Update version in meta.yaml
          sed -i "s/{% set version = \".*\" %}/{% set version = \"$VERSION\" %}/" "$RECIPE_DIR/meta.yaml"
          # Update SHA256 in meta.yaml
          sed -i "s/sha256: .*/sha256: $SHA256/" "$RECIPE_DIR/meta.yaml"

          # Show diff
          git -C bioconda-recipes diff

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request to bioconda-recipes
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.BIOCONDA_BOT_TOKEN }}
          path: bioconda-recipes
          branch: bump-${{ steps.update.outputs.package }}-${{ steps.update.outputs.version }}
          title: "Update ${{ steps.update.outputs.package }} to ${{ steps.update.outputs.version }}"
          body: |
            This PR updates **${{ steps.update.outputs.package }}** to version **${{ steps.update.outputs.version }}**.

            Auto-generated by the [release workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            - [PyPI release](https://pypi.org/project/${{ steps.update.outputs.package }}/${{ steps.update.outputs.version }}/)
            - [GitHub release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})
          commit-message: "Update ${{ steps.update.outputs.package }} to ${{ steps.update.outputs.version }}"
          committer: "Bioconda Bot <bioconda@users.noreply.github.com>"
          author: "Bioconda Bot <bioconda@users.noreply.github.com>"
          delete-branch: true
